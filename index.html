<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Jothy</title>
    <!-- Romantic & Aesthetic Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcf8f7; /* Soft cream */
            --text-main: #7a6e6e; /* Muted brown-grey */
            --accent: #bfa3a3; /* Dusty rose */
        }

        * { box-sizing: border-box; transition: all 0.4s ease; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Quicksand', sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 60px 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: center;
            width: 85%;
            max-width: 400px;
            position: relative;
        }

        .page { display: none; }
        .active { display: block; animation: fadeIn 0.8s ease-out; }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 3.2rem;
            margin-bottom: 30px;
            color: var(--accent);
            line-height: 1.2;
        }

        p { font-size: 1.1rem; line-height: 1.5; margin-bottom: 20px; }

        .btn-group {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            height: 50px;
            position: relative;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Quicksand', sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        button:hover { background: #ab8e8e; transform: translateY(-2px); }

        #no-btn {
            background: #eee;
            color: #888;
            position: absolute;
            z-index: 999;
        }

        .song-text {
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #8e7f7f;
            margin-bottom: 25px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Updated Audio Tag to match your filename -->
    <audio id="myAudio" loop preload="auto">
        <source src="song.mp3.mpeg" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <div class="card">
        <!-- PAGE 1: GREETING -->
        <div id="page1" class="page active">
            <h1>good mrngg jothyyy</h1>
            <button onclick="playAndNext()">Morning!</button>
        </div>

        <!-- PAGE 2: THE QUESTION -->
        <div id="page2" class="page">
            <h1>Can I ask you something?</h1>
            <p>Will you promise to have an amazing day today?</p>
            <div class="btn-group">
                <button id="yes-btn" onclick="showPage(3)">Yes</button>
                <button id="no-btn" onmouseover="moveNo()" onclick="moveNo()">No</button>
            </div>
        </div>

        <!-- PAGE 3: THE MESSAGE -->
        <div id="page3" class="page">
            <h1>For you pookie</h1>
            <p class="song-text">"This song felt like you… soft and beautiful. Hope it makes you smile."</p>
            <p style="font-size: 0.7rem; color: #ccc;">Music playing... 😊</p>
        </div>
    </div>

    <script>
        const audio = document.getElementById('myAudio');

        function playAndNext() {
            // Browsers block audio until a click happens. 
            // This click on "Morning!" starts the song.mp3.mpeg file.
            audio.play().then(() => {
                console.log("Music started!");
            }).catch(err => {
                console.log("Playback error:", err);
            });
            showPage(2);
        }

        function showPage(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
        }

        function moveNo() {
            const btn = document.getElementById('no-btn');
            const x = Math.random() * (window.innerWidth - btn.clientWidth - 50);
            const y = Math.random() * (window.innerHeight - btn.clientHeight - 50);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }
    </script>
</body>
</html>
